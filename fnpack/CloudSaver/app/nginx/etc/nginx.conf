# nginx.conf
worker_processes auto;  # 设置 Nginx 进程数

error_log  /var/apps/CloudSaver/var/logs/error.log notice;
pid        /var/apps/CloudSaver/var/nginx.pid;

events {
    worker_connections 1024;  # 每个 worker 进程最大连接数
}

http {
   include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log   /var/apps/CloudSaver/var/logs/access.log  main;
    server {
        listen 8008;                    # IPv4 监听
        listen [::]:8008 ipv6only=on;   # IPv6 监听
        server_name localhost;

        location / {
            root /var/apps/CloudSaver/target/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control no-cache;
            add_header Pragma no-cache;
            add_header Expires 0;
        }

        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://localhost:8009;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 支持IPv6地址传递
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Forwarded-Host $host;
        }
        
        location /tele-images/ {
            proxy_pass http://localhost:8009;
            proxy_set_header Host $host;
        }
    }
}
