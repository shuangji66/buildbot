name: Build Transmission-debian12

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        arch: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.arch }}
    container:
      image: debian:bookworm
    steps:
      - name: Install build dependencies
        run: |
          apt update && apt install -y \
            build-essential \
            cmake \
            pkg-config \
            libssl-dev \
            libcurl4-openssl-dev \
            libevent-dev \
            libbrotli-dev \
            libnghttp2-dev \
            zlib1g-dev \
            gettext \
            xz-utils \
            wget

      - name: Download source
        run: |
          wget https://github.com/transmission/transmission/releases/download/4.1.1/transmission-4.1.1.tar.xz
          tar xf transmission-4.1.1.tar.xz
          cd transmission-4.1.1

      - name: Configure CMake
        working-directory: transmission-4.1.1
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DENABLE_GTK=OFF \
            -DENABLE_QT=OFF \
            -DENABLE_MAC=OFF \
            -DENABLE_DAEMON=ON \
            -DENABLE_UTILS=ON \
            -DENABLE_CLI=ON \
            -DENABLE_NLS=OFF \
            -DENABLE_TESTS=OFF \
            -DWITH_CRYPTO=openssl \
            -DUSE_SYSTEM_EVENT2=OFF \
            -DUSE_SYSTEM_DEFLATE=OFF \
            -DUSE_SYSTEM_DHT=OFF \
            -DUSE_SYSTEM_MINIUPNPC=OFF \
            -DUSE_SYSTEM_NATPMP=OFF \
            -DUSE_SYSTEM_UTP=OFF \
            -DUSE_SYSTEM_B64=OFF \
            -DUSE_SYSTEM_PSL=OFF

      - name: Build
        working-directory: transmission-4.1.1
        run: cmake --build build --parallel $(nproc)

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: transmission-bin-${{ matrix.arch }}
          path: |
            transmission-4.1.1/build/daemon/transmission-daemon
            transmission-4.1.1/build/utils/transmission*
